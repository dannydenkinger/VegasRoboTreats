<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Vegas Robo Treats</title>
<meta name="description" content="The page you're looking for doesn't exist. Head back to Vegas Robo Treats to learn about our free robotic dessert machines for local businesses."/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Manrope:wght@200..800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "surface": "#0e0e0e", "background": "#0e0e0e", "on-surface": "#ffffff",
        "on-surface-variant": "#adaaaa", "primary": "#df8eff", "secondary": "#00e3fd",
        "tertiary": "#ff6e81", "on-primary": "#4f006d", "surface-container": "#1a1919",
        "surface-container-low": "#131313", "surface-container-high": "#201f1f",
        "surface-container-highest": "#262626", "outline-variant": "#484847"
      },
      fontFamily: { headline: ["Space Grotesk"], body: ["Manrope"] }
    }
  }
}
</script>
<style>
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-12px); }
  }
  @keyframes scratch {
    0%, 100% { transform: rotate(-8deg); }
    50% { transform: rotate(8deg); }
  }
  @keyframes blink {
    0%, 90%, 100% { transform: scaleY(1); }
    95% { transform: scaleY(0.1); }
  }
  @keyframes question-float {
    0%, 100% { transform: translateY(0px) rotate(-5deg); opacity: 0.7; }
    50% { transform: translateY(-8px) rotate(5deg); opacity: 1; }
  }
  .robot-body { animation: float 3.5s ease-in-out infinite; }
  .robot-arm-scratch { animation: scratch 0.6s ease-in-out infinite; transform-origin: 20px 10px; }
  .robot-eye { animation: blink 4s ease-in-out infinite; transform-origin: center; }
  .question-mark { animation: question-float 2s ease-in-out infinite; }
  .question-mark-2 { animation: question-float 2s ease-in-out infinite 0.5s; }
  .question-mark-3 { animation: question-float 2s ease-in-out infinite 1s; }
</style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col items-center justify-center selection:bg-primary selection:text-on-primary px-8">

<!-- Subtle background glow -->
<div class="fixed inset-0 pointer-events-none overflow-hidden">
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] rounded-full opacity-5" style="background: radial-gradient(circle, #df8eff 0%, transparent 70%);"></div>
</div>

<div class="text-center max-w-xl relative z-10">

  <!-- Robot SVG -->
  <div class="flex justify-center mb-6">
    <div class="relative">
      <!-- Floating question marks -->
      <svg class="question-mark absolute -top-8 right-4" width="24" height="32" viewBox="0 0 24 32" fill="none">
        <text x="0" y="26" font-size="28" font-family="Space Grotesk" font-weight="900" fill="#df8eff">?</text>
      </svg>
      <svg class="question-mark-2 absolute -top-12 right-16" width="18" height="26" viewBox="0 0 18 26" fill="none">
        <text x="0" y="20" font-size="22" font-family="Space Grotesk" font-weight="900" fill="#00e3fd" opacity="0.8">?</text>
      </svg>
      <svg class="question-mark-3 absolute -top-6 right-28" width="14" height="20" viewBox="0 0 14 20" fill="none">
        <text x="0" y="16" font-size="16" font-family="Space Grotesk" font-weight="900" fill="#ff6e81" opacity="0.6">?</text>
      </svg>

      <!-- Main robot SVG -->
      <svg class="robot-body" width="200" height="260" viewBox="0 0 200 260" fill="none" xmlns="http://www.w3.org/2000/svg">

        <!-- Antenna -->
        <line x1="100" y1="10" x2="100" y2="38" stroke="#adaaaa" stroke-width="3" stroke-linecap="round"/>
        <circle cx="100" cy="8" r="6" fill="#df8eff"/>
        <circle cx="100" cy="8" r="3" fill="white" opacity="0.6"/>

        <!-- Head -->
        <rect x="55" y="38" width="90" height="75" rx="18" fill="#1a1919"/>
        <rect x="55" y="38" width="90" height="75" rx="18" stroke="#df8eff" stroke-width="1.5" stroke-opacity="0.4"/>

        <!-- Face screen / visor -->
        <rect x="64" y="48" width="72" height="45" rx="10" fill="#0e0e0e"/>
        <rect x="64" y="48" width="72" height="45" rx="10" stroke="#df8eff" stroke-width="1" stroke-opacity="0.3"/>

        <!-- Eyes -->
        <g class="robot-eye">
          <rect x="73" y="58" width="18" height="14" rx="5" fill="#df8eff" opacity="0.9"/>
          <rect x="75" y="60" width="6" height="6" rx="2" fill="white" opacity="0.7"/>
        </g>
        <g class="robot-eye" style="animation-delay: 0.3s">
          <rect x="109" y="58" width="18" height="14" rx="5" fill="#00e3fd" opacity="0.9"/>
          <rect x="111" y="60" width="6" height="6" rx="2" fill="white" opacity="0.7"/>
        </g>

        <!-- Confused mouth (wavy) -->
        <path d="M 78 82 Q 84 86 90 82 Q 96 78 102 82 Q 108 86 114 82 Q 120 78 126 82" stroke="#adaaaa" stroke-width="2.5" stroke-linecap="round" fill="none"/>

        <!-- Ear nubs -->
        <rect x="46" y="58" width="10" height="16" rx="4" fill="#262626" stroke="#484847" stroke-width="1"/>
        <rect x="144" y="58" width="10" height="16" rx="4" fill="#262626" stroke="#484847" stroke-width="1"/>

        <!-- Neck -->
        <rect x="90" y="113" width="20" height="10" rx="3" fill="#262626"/>

        <!-- Body -->
        <rect x="48" y="123" width="104" height="85" rx="16" fill="#1a1919"/>
        <rect x="48" y="123" width="104" height="85" rx="16" stroke="#df8eff" stroke-width="1.5" stroke-opacity="0.25"/>

        <!-- Chest panel -->
        <rect x="62" y="135" width="76" height="48" rx="8" fill="#0e0e0e"/>
        <rect x="62" y="135" width="76" height="48" rx="8" stroke="#484847" stroke-width="1"/>

        <!-- Chest lights -->
        <circle cx="78" cy="151" r="5" fill="#df8eff" opacity="0.8"/>
        <circle cx="100" cy="151" r="5" fill="#00e3fd" opacity="0.8"/>
        <circle cx="122" cy="151" r="5" fill="#ff6e81" opacity="0.8"/>
        <rect x="70" y="163" width="60" height="8" rx="3" fill="#262626"/>
        <rect x="70" y="163" width="28" height="8" rx="3" fill="#df8eff" opacity="0.5"/>

        <!-- Left arm (hanging down, normal) -->
        <rect x="22" y="126" width="28" height="60" rx="12" fill="#1a1919" stroke="#484847" stroke-width="1"/>
        <!-- Left hand -->
        <ellipse cx="36" cy="192" rx="13" ry="10" fill="#262626" stroke="#484847" stroke-width="1"/>

        <!-- Right arm (raised, scratching head) — pivots from shoulder -->
        <g class="robot-arm-scratch" style="transform-origin: 148px 132px;">
          <!-- Upper arm -->
          <rect x="148" y="123" width="28" height="46" rx="12" fill="#1a1919" stroke="#df8eff" stroke-width="1" stroke-opacity="0.4"/>
          <!-- Forearm going up toward head -->
          <rect x="152" y="82" width="22" height="44" rx="10" fill="#1a1919" stroke="#df8eff" stroke-width="1" stroke-opacity="0.4"/>
          <!-- Hand -->
          <ellipse cx="163" cy="80" rx="12" ry="9" fill="#262626" stroke="#df8eff" stroke-width="1" stroke-opacity="0.4"/>
          <!-- Finger scratching -->
          <rect x="160" y="68" width="6" height="16" rx="3" fill="#262626" stroke="#adaaaa" stroke-width="1"/>
        </g>

        <!-- Legs -->
        <rect x="68" y="206" width="28" height="44" rx="10" fill="#1a1919" stroke="#484847" stroke-width="1"/>
        <rect x="104" y="206" width="28" height="44" rx="10" fill="#1a1919" stroke="#484847" stroke-width="1"/>

        <!-- Feet -->
        <rect x="60" y="244" width="40" height="16" rx="8" fill="#262626" stroke="#484847" stroke-width="1"/>
        <rect x="96" y="244" width="40" height="16" rx="8" fill="#262626" stroke="#484847" stroke-width="1"/>

      </svg>
    </div>
  </div>

  <!-- 404 text -->
  <h1 class="text-7xl md:text-9xl font-black font-headline tracking-tighter text-primary mb-3 leading-none">404</h1>
  <h2 class="text-xl md:text-2xl font-bold font-headline tracking-tight mb-4">Hmm... that page doesn't exist.</h2>
  <p class="text-on-surface-variant text-base md:text-lg mb-10 leading-relaxed">
    Even our robots can't find this one. Let's get you somewhere that works.
  </p>

  <!-- Buttons -->
  <div class="flex flex-wrap justify-center gap-4">
    <a href="index.html" class="bg-primary text-on-primary px-8 py-4 rounded-xl font-bold uppercase tracking-widest text-sm hover:scale-105 transition-transform no-underline">Back to Home</a>
    <a href="machines.html" class="border border-secondary/40 text-secondary px-8 py-4 rounded-xl font-bold uppercase tracking-widest text-sm hover:bg-secondary/10 transition-all no-underline">View Machines</a>
    <a href="about.html#contact" class="border border-white/10 text-on-surface-variant px-8 py-4 rounded-xl font-bold uppercase tracking-widest text-sm hover:bg-white/5 transition-all no-underline">Contact Us</a>
  </div>

</div>
</body></html>

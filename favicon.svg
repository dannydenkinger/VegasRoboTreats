<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="18" fill="#0e0e0e"/>
  <!-- Robot head -->
  <rect x="22" y="32" width="56" height="44" rx="10" fill="none" stroke="#df8eff" stroke-width="4"/>
  <!-- Eyes -->
  <rect x="32" y="46" width="12" height="10" rx="3" fill="#00e3fd"/>
  <rect x="56" y="46" width="12" height="10" rx="3" fill="#00e3fd"/>
  <!-- Antenna base -->
  <rect x="47" y="22" width="6" height="12" rx="3" fill="#df8eff"/>
  <!-- Antenna tip -->
  <circle cx="50" cy="18" r="5" fill="#df8eff"/>
  <!-- Mouth -->
  <rect x="35" y="64" width="30" height="5" rx="2.5" fill="#00e3fd" opacity="0.7"/>
</svg>
